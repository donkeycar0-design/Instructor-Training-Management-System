<!DOCTYPE html>
<html lang="ko">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', sans-serif; background: #F5F6FA; color: #0f172a; -webkit-tap-highlight-color: transparent; overflow: hidden; height: 100dvh; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    /* ── 레이아웃 ── */
    .app-shell { display: flex; height: 100dvh; overflow: hidden; }
    .sidebar { width: 240px; min-width: 240px; background: #fff; border-right: 1px solid #f1f5f9; display: flex; flex-direction: column; padding: 24px 20px; z-index: 50; transition: transform .3s ease; }
    .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; margin-top: 4px; }
    .logo-icon { width: 44px; height: 44px; background: #0f172a; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fb923c; transform: rotate(-3deg); flex-shrink: 0; }
    .logo-title { font-size: 15px; font-weight: 900; color: #0f172a; line-height: 1.1; }
    .logo-sub { font-size: 9px; font-weight: 900; color: #f97316; letter-spacing: .1em; text-transform: uppercase; margin-top: 3px; }
    .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-btn { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 16px; font-size: 13px; font-weight: 900; color: #94a3b8; transition: all .2s; width: 100%; text-align: left; }
    .nav-btn:hover { background: #f8fafc; color: #475569; }
    .nav-btn.active-orange { background: #f97316; color: #fff; }
    .nav-btn.active-dark { background: #0f172a; color: #fff; }
    .nav-btn.active-green { background: #10b981; color: #fff; }
    .nav-btn.active-purple { background: #8b5cf6; color: #fff; }
    .nav-btn.active-red { background: #ef4444; color: #fff; }
    .nav-btn.active-blue { background: #3b82f6; color: #fff; }
    .sidebar-footer { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .main { flex: 1; overflow-y: auto; padding: 36px 40px; }
    .main-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .header-eyebrow { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .15em; margin-bottom: 4px; }
    .header-title { font-size: 28px; font-weight: 900; color: #0f172a; letter-spacing: -.03em; }
    .mobile-menu-btn { display: none; position: fixed; top: 14px; right: 14px; z-index: 60; width: 44px; height: 44px; background: #0f172a; color: #fff; border-radius: 14px; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.3); z-index: 40; backdrop-filter: blur(4px); }

    /* ── 카드 ── */
    .card { background: #fff; border: 1px solid #f1f5f9; border-radius: 24px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .card-title { font-size: 14px; font-weight: 900; color: #0f172a; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .stat-card { background: #fff; border: 1px solid #f1f5f9; border-radius: 20px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
    .stat-label { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
    .stat-val { font-size: 32px; font-weight: 900; }

    /* ── 로그인 ── */
    .login-wrap { height: 100dvh; display: flex; align-items: center; justify-content: center; background: #F5F6FA; padding: 24px; }
    .login-box { background: #fff; border: 1px solid #f1f5f9; border-radius: 32px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .login-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
    .login-title { font-size: 22px; font-weight: 900; color: #0f172a; margin-bottom: 6px; }
    .login-sub { font-size: 13px; font-weight: 700; color: #94a3b8; margin-bottom: 28px; }
    .login-input { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 16px; padding: 14px 18px; font-size: 14px; font-weight: 700; outline: none; transition: border-color .2s; margin-bottom: 12px; color: #0f172a; }
    .login-input:focus { border-color: #fb923c; }
    .login-btn { width: 100%; padding: 16px; font-size: 15px; font-weight: 900; color: #fff; background: #0f172a; border-radius: 16px; margin-top: 8px; transition: background .15s; }
    .login-btn:hover { background: #1e293b; }
    .login-err { font-size: 12px; font-weight: 700; color: #ef4444; text-align: center; margin-top: 8px; }
    .role-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .role-tab { flex: 1; padding: 10px; border-radius: 14px; font-size: 13px; font-weight: 900; background: #f8fafc; color: #94a3b8; transition: all .15s; }
    .role-tab.active { background: #0f172a; color: #fff; }

    /* ── 폼 요소 ── */
    .form-input { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 14px; padding: 12px 16px; font-size: 13px; font-weight: 700; outline: none; transition: border-color .2s; color: #0f172a; }
    .form-input:focus { border-color: #fb923c; }
    .form-textarea { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 14px; padding: 12px 16px; font-size: 13px; font-weight: 700; outline: none; transition: border-color .2s; color: #0f172a; resize: vertical; min-height: 100px; }
    .form-textarea:focus { border-color: #fb923c; }
    .form-select { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 14px; padding: 12px 16px; font-size: 13px; font-weight: 700; outline: none; color: #0f172a; cursor: pointer; }
    .form-label { font-size: 11px; font-weight: 900; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .08em; }

    /* ── 버튼 ── */
    .btn-primary { padding: 12px 20px; background: #0f172a; color: #fff; border-radius: 14px; font-size: 13px; font-weight: 900; transition: background .15s; display: flex; align-items: center; gap: 6px; }

    .btn-orange { background: #f97316; }
    .btn-orange:hover { background: #ea6c0a; }
    .btn-green { background: #10b981; }
    .btn-green:hover { background: #059669; }
    .btn-purple { background: #8b5cf6; }
    .btn-purple:hover { background: #7c3aed; }
    .btn-red { background: #ef4444; }
    .btn-red:hover { background: #dc2626; }
    .btn-blue { background: #3b82f6; }
    .btn-blue:hover { background: #2563eb; }
    .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 10px; }

    /* ── 모달 ── */
    .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(15,23,42,.4); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal-box { background: #fff; width: 100%; max-width: 440px; border-radius: 32px; padding: 32px; box-shadow: 0 24px 64px rgba(0,0,0,.15); animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1) both; display: flex; flex-direction: column; gap: 12px; }

    .modal-btns { display: flex; gap: 8px; margin-top: 8px; }
    .btn-cancel { flex: 1; padding: 14px; font-size: 14px; font-weight: 900; color: #94a3b8; background: #f8fafc; border-radius: 16px; }
    .btn-confirm { flex: 1; padding: 14px; font-size: 14px; font-weight: 900; color: #fff; background: #0f172a; border-radius: 16px; }

    /* ── 토스트 ── */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 200; padding: 12px 20px; border-radius: 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1) both; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .toast-success { background: #0f172a; color: #fff; }
    .toast-error { background: #ef4444; color: #fff; }

    /* ── 리스트 아이템 ── */
    .list-item { padding: 16px; border: 1px solid #f1f5f9; border-radius: 16px; background: #fff; display: flex; flex-direction: column; gap: 8px; transition: box-shadow .15s; }
    .list-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .list-meta { font-size: 11px; font-weight: 700; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
    .list-content { font-size: 13px; font-weight: 700; color: #475569; line-height: 1.6; white-space: pre-wrap; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 900; }
    .badge-new { background: #fee2e2; color: #dc2626; }
    .badge-done { background: #d1fae5; color: #059669; }
    .badge-warn { background: #fef3c7; color: #d97706; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }

    /* ── 공지 ── */
    .notice-item { padding: 16px 20px; border-left: 4px solid #f97316; background: #fff7ed; border-radius: 0 14px 14px 0; margin-bottom: 10px; }
    .notice-title { font-size: 14px; font-weight: 900; color: #0f172a; margin-bottom: 4px; }
    .notice-body { font-size: 13px; font-weight: 700; color: #64748b; line-height: 1.6; }
    .notice-date { font-size: 11px; font-weight: 700; color: #94a3b8; margin-top: 6px; }

    /* ── 유저 카드 ── */
    .user-info-card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; flex-shrink: 0; }
    .user-avatar.admin { background: #f97316; }

    /* ── 로딩/에러 ── */
    .full-center { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f97316; border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; }
    .empty-box { padding: 60px 24px; border: 2px dashed #e2e8f0; border-radius: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px; color: #cbd5e1; text-align: center; }

    /* ── 애니메이션 ── */
    @keyframes scaleIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn .3s ease both; }
    .spin { animation: spin .8s linear infinite; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
        .sidebar { position: fixed; inset-y: 0; left: 0; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,.08); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay.open { display: block; }
        .mobile-menu-btn { display: flex; }
        .main { padding: 20px 16px; padding-top: 72px; }
        .grid-2, .grid-3 { grid-template-columns: 1fr; }
        .header-title { font-size: 22px; }
    }
    @media (min-width: 769px) { .modal-overlay { align-items: center; } }
    </style>
</head>

// 일반 관리자 4명 (이름 + 초기비번 1234, 첫 로그인 후 변경)
const ADMIN_ACCOUNTS = [
    {name:'김남탁',  password:'1234', isFirst:true},

const ALL_CLASSES = (() => {
    const out = [];

        out.push(
            {id:`e${g}-mw-s`, label:`초등 ${g}학년 월목 수반`},
            {id:`e${g}-mw-h`, label:`초등 ${g}학년 월목 학반`},
            {id:`e${g}-hg-s`, label:`초등 ${g}학년 화금 수반`},
            {id:`e${g}-hg-h`, label:`초등 ${g}학년 화금 학반`},
        );
    });
    return out;
})();

const GRADE_GROUPS = [1,2,3,4,5,6].map(g => ({
    grade: `${g}학년`,
    classes: ALL_CLASSES.filter(c => c.id.startsWith(`e${g}-`)),
}));

// 강사의 담당반 ID 배열 → 라벨 배열
const getClassLabels = (classStr) => {
    if (!classStr) return [];
    return classStr.split(',').map(id => ALL_CLASSES.find(c=>c.id===id.trim())?.label).filter(Boolean);
};

// ━━━ ⚙️ Google Apps Script 배포 URL ━━━
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzu2np9Ews-61awbMHi0OcSt0o9oCvTUFAa3WFrjWoByr3taHf_zML4d2TGr7h72Fe6Vw/exec';

// ── 실제 GAS API ──
const api = {

    post: body   => fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(body) }).then(r => r.json()),
};

const PATHS = {
    sparkles: "M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z",

const Icon = ({ name, size=20, cls='', style:s={} }) => {
    const d = PATHS[name]; if (!d) return null;
    return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={cls} style={s}><path d={d}/></svg>;
};

const Toast = ({ message, type='success', onDone }) => {
    useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
    return <div className={`toast toast-${type}`}><Icon name={type==='success'?'check':'alert'} size={14}/>{message}</div>;
};

// ━━━ 로그인 화면 ━━━
const LoginScreen = ({ onLogin }) => {
    const [name,    setName]    = useState('');
    const [pw,      setPw]      = useState('');
    const [err,     setErr]     = useState('');
    const [loading, setLoading] = useState(false);

    const handleLogin = async () => {
        setErr(''); setLoading(true);
        try {
            const trimName = name.trim();

            // 1. 슈퍼 관리자 — 이름 없이 비번만
            if (!trimName && pw === SUPER_ADMIN_PW) {
                onLogin({ role:'admin', name:'관리자', isSuper:true });
                return;
            }

            // 2. 일반 관리자 — 코드에 고정된 계정 확인
            const ADMIN_LIST = ['김남탁','김유식','사공은영','김윤희'];
            if (ADMIN_LIST.includes(trimName)) {
                // 비번은 로컬스토리지에 저장 (GAS 저장 안 함)
                const savedPw = localStorage.getItem('admin_pw_' + trimName) || '1234';
                const isFirst = localStorage.getItem('admin_first_' + trimName) !== 'done';
                if (savedPw !== pw) { setErr('비밀번호가 틀렸습니다'); return; }
                onLogin({ role:'admin', name:trimName, isFirst:isFirst, isSuper:false });
                return;
            }

            // 3. 강사 — 이름 + 비번
            if (!trimName) { setErr('이름을 입력해 주세요'); return; }
            const teachers = await api.get('getTeachers');
            const foundTeacher = Array.isArray(teachers) ? teachers.find(t=>t.Name===trimName) : null;

            if (!foundTeacher) {
                // 첫 방문 강사
                if (pw !== TEACHER_INIT_PW) { setErr('처음 로그인은 초기 비번을 사용해 주세요'); return; }
                const res = await api.post({ action:'registerTeacher', name:trimName });
                if (res.error) { setErr(res.error); return; }
                onLogin({ role:'teacher', name:trimName, isFirst:true });
            } else {
                if (foundTeacher.Password !== pw) { setErr('비밀번호가 틀렸습니다'); return; }
                onLogin({ role:'teacher', name:foundTeacher.Name, isFirst:foundTeacher.IsFirst||false, classes:foundTeacher.Classes||'' });
            }
        } catch(e) { setErr('연결 오류: '+e.message); }
        finally { setLoading(false); }
    };

    return (
        <div className="login-wrap">
            <div className="login-box">
                <div className="login-logo">
                    <div className="logo-icon"><Icon name="sparkles" size={22}/></div>
                    <div><div className="logo-title">군위몰입수학</div><div className="logo-sub">Staff Portal</div></div>
                </div>
                <div style={{marginBottom:20,fontSize:13,fontWeight:700,color:'#94a3b8',textAlign:'center'}}>
                    이름과 비밀번호를 입력해 주세요
                </div>
                <input className="login-input" placeholder="이름" value={name}
                    onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
                <input className="login-input" type="password" placeholder="비밀번호"
                    value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
                <button className="login-btn" onClick={handleLogin} disabled={loading}>
                    {loading?'확인 중...':'로그인'}
                </button>
                {err && <div className="login-err">{err}</div>}
                <div style={{marginTop:16,padding:'12px 16px',background:'#fff7ed',borderRadius:14,fontSize:12,fontWeight:700,color:'#92400e',lineHeight:1.8}}>
                    <div style={{fontWeight:900,marginBottom:6}}>첫 로그인 안내</div>
                    <div>강사 · 관리자: <span style={{color:'#f97316',fontWeight:900}}>이름 / 1234</span></div>
                    <div>슈퍼관리자: <span style={{color:'#0f172a',fontWeight:900}}>비번만 입력</span></div>
                    <div style={{color:'#a16207',marginTop:4,fontSize:11}}>로그인 후 비번 변경 필수</div>
                </div>
            </div>
        </div>
    );
};

const SetupScreen = ({ user, onDone }) => {
    const [step,      setStep]      = useState(1); // 1:비번변경 2:담당반선택
    const [newPw,     setNewPw]     = useState('');
    const [confirmPw, setConfirmPw] = useState('');
    const [classes,   setClasses]   = useState([]);
    const [err,       setErr]       = useState('');
    const [saving,    setSaving]    = useState(false);

    const toggleClass = id =>
        setClasses(prev => prev.includes(id) ? prev.filter(c=>c!==id) : [...prev, id]);

    const handlePwNext = () => {
        if (newPw.length < 4) { setErr('비번은 4자리 이상 입력해 주세요'); return; }
        if (newPw !== confirmPw) { setErr('비번이 일치하지 않습니다'); return; }
        setErr(''); setStep(2);
    };

    const handleFinish = async () => {
        setSaving(true);
        try {
            await api.post({ action:'updateTeacherPw', name:user.name, newPw });
            await api.post({ action:'updateTeacherClasses', name:user.name, classes:classes.join(',') });
            onDone({ ...user, isFirst:false, classes:classes.join(',') });
        } catch(e) { setErr('저장 실패'); }
        finally { setSaving(false); }
    };

    return (
        <div className="login-wrap" style={{background:'#F5F6FA'}}>
            <div className="login-box" style={{maxWidth:440}}>
                <div className="login-logo">
                    <div className="logo-icon"><Icon name="sparkles" size={22}/></div>
                    <div><div className="logo-title">군위몰입수학</div><div className="logo-sub">첫 로그인 설정</div></div>
                </div>

                {/* 스텝 인디케이터 */}
                <div style={{display:'flex',gap:8,marginBottom:28}}>
                    {['비밀번호 변경','담당반 선택'].map((s,i)=>(
                        <div key={i} style={{flex:1,padding:'8px 12px',borderRadius:12,background:step===i+1?'#0f172a':step>i+1?'#10b981':'#f8fafc',color:step>=i+1?'#fff':'#94a3b8',fontSize:12,fontWeight:900,textAlign:'center',transition:'all .2s'}}>
                            {step>i+1?'✓ ':''}{s}
                        </div>
                    ))}
                </div>

                {step === 1 && (
                    <>
                        <div style={{fontSize:13,fontWeight:700,color:'#64748b',marginBottom:20,textAlign:'center'}}>
                            <span style={{fontWeight:900,color:'#0f172a'}}>{user.name}</span> 강사님, 새 비밀번호를 설정해 주세요
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
                            <input className="login-input" type="password" placeholder="새 비밀번호 (4자리 이상)" value={newPw} onChange={e=>setNewPw(e.target.value)} style={{marginBottom:0}}/>
                            <input className="login-input" type="password" placeholder="비밀번호 확인" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handlePwNext()} style={{marginBottom:0}}/>
                        </div>
                        {err && <div className="login-err" style={{marginBottom:10}}>{err}</div>}
                        <button className="login-btn" onClick={handlePwNext}>다음 →</button>
                    </>
                )}

                {step === 2 && (
                    <>
                        <div style={{fontSize:13,fontWeight:700,color:'#64748b',marginBottom:16,textAlign:'center'}}>
                            담당 수업을 선택해 주세요
                            <span style={{marginLeft:8,color:'#f97316',fontWeight:900}}>{classes.length}개 선택</span>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:10,maxHeight:360,overflowY:'auto',marginBottom:16}}>
                            {GRADE_GROUPS.map(g=>(
                                <div key={g.grade}>
                                    <div style={{fontSize:11,fontWeight:900,color:'#64748b',marginBottom:6,padding:'3px 8px',background:'#f1f5f9',borderRadius:8,display:'inline-block'}}>{g.grade}</div>
                                    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:6}}>
                                        {g.classes.map(c=>{
                                            const checked = classes.includes(c.id);
                                            const dayPart  = c.id.includes('-mw-')?'월목':'화금';
                                            const typePart = c.id.endsWith('-s')?'수반':'학반';
                                            return (
                                                <button key={c.id} onClick={()=>toggleClass(c.id)} style={{
                                                    display:'flex',alignItems:'center',gap:8,padding:'10px 12px',borderRadius:12,
                                                    border:`2px solid ${checked?'#0f172a':'#f1f5f9'}`,
                                                    background:checked?'#0f172a':'#f8fafc',
                                                    color:checked?'#fff':'#64748b',
                                                    fontSize:12,fontWeight:900,transition:'all .15s',
                                                }}>
                                                    <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${checked?'#fff':'#cbd5e1'}`,background:checked?'#f97316':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                                                        {checked&&<Icon name="check" size={10} style={{color:'#fff'}}/>}
                                                    </div>
                                                    {dayPart} {typePart}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                        {err && <div className="login-err" style={{marginBottom:10}}>{err}</div>}
                        <div style={{display:'flex',gap:8}}>
                            <button onClick={()=>setStep(1)} style={{flex:1,padding:14,borderRadius:14,fontSize:14,fontWeight:900,background:'#f8fafc',color:'#94a3b8'}}>← 이전</button>
                            <button className="login-btn" style={{flex:2,marginTop:0}} onClick={handleFinish} disabled={saving}>
                                {saving?'저장 중...':'설정 완료 →'}
                            </button>
                        </div>
                    </>
                )}
            </div>
        </div>
    );
};

    const [showModal, setShowModal] = useState(false);
    const [form, setForm] = useState({ title:'', content:'' });
    const [saving, setSaving] = useState(false);

// ━━━ 강사/관리자 계정 관리 ━━━
const TeacherMgr = ({ teachers, admins, showToast, reload }) => {
    const [expanded, setExpanded] = useState(null);
    const [tab,      setTab]      = useState('teacher');

    const handleResetTeacherPw = async (name) => {
        if (!confirm(`${name} 강사의 비번을 1234로 초기화할까요?`)) return;
        try {
            await api.post({ action:'resetTeacherPw', name });
            showToast(`${name} 강사 비번이 1234로 초기화됐습니다`);
            reload();
        } catch(e){ showToast('초기화 실패','error'); }
    };

    const handleResetAdminPw = (name) => {
        if (!confirm(`${name} 관리자의 비번을 1234로 초기화할까요?`)) return;
        localStorage.setItem('admin_pw_' + name, '1234');
        localStorage.removeItem('admin_first_' + name);
        showToast(`${name} 관리자 비번이 1234로 초기화됐습니다`);
    };

    const handleDeleteTeacher = async (id, name) => {
        if (!confirm(`${name} 강사 계정을 삭제하시겠습니까?`)) return;
        try { await api.post({action:'deleteTeacher',id}); showToast('삭제되었습니다'); reload(); }
        catch(e){ showToast('삭제 실패','error'); }
    };

    // GAS에서 오는 필드명 정규화 (대소문자 대응)
    const safeTeachers = (teachers||[]).map(t => ({
        ID:       t.ID       || t.id       || '',
        Name:     t.Name     || t.name     || '',
        Classes:  t.Classes  || t.classes  || '',
        IsFirst:  t.IsFirst  || t.isFirst  || false,
    }));

    const safeAdmins = (admins||[]).map(a => ({
        name:    a.name    || '',
        isFirst: a.isFirst || false,
    }));

    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            {/* 탭 */}
            <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setTab('teacher')} style={{flex:1,padding:'10px',borderRadius:14,fontSize:13,fontWeight:900,background:tab==='teacher'?'#0f172a':'#f8fafc',color:tab==='teacher'?'#fff':'#94a3b8',transition:'all .15s'}}>
                    강사 계정
                </button>
                <button onClick={()=>setTab('admin')} style={{flex:1,padding:'10px',borderRadius:14,fontSize:13,fontWeight:900,background:tab==='admin'?'#f97316':'#f8fafc',color:tab==='admin'?'#fff':'#94a3b8',transition:'all .15s'}}>
                    관리자 계정
                </button>
            </div>

            {/* 안내 */}
            <div style={{padding:'12px 16px',background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:14,fontSize:12,fontWeight:700,color:'#92400e'}}>
                비번 분실 시 <span style={{fontWeight:900}}>비번 초기화</span> 버튼을 누르면 <span style={{color:'#f97316',fontWeight:900}}>1234</span>로 리셋됩니다.
            </div>

            {/* 강사 목록 */}
            {tab === 'teacher' && (
                <>
                    {safeTeachers.length === 0
                        ? <div className="empty-box"><p style={{fontWeight:700}}>등록된 강사가 없습니다</p><span style={{fontSize:13}}>강사가 첫 로그인하면 자동으로 표시됩니다</span></div>
                        : safeTeachers.map(t => {
                            const labels = getClassLabels(t.Classes);
                            const isExp  = expanded === t.ID;
                            return (
                                <div key={t.ID} className="list-item" style={{gap:12}}>
                                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                        <div style={{display:'flex',alignItems:'center',gap:10}}>

                                            <div>
                                                <div style={{display:'flex',alignItems:'center',gap:6}}>
                                                    <span style={{fontSize:14,fontWeight:900,color:'#1e293b'}}>{t.Name} 강사</span>
                                                    {t.IsFirst && <span className="badge badge-warn">설정 미완료</span>}
                                                </div>
                                                <div style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>담당 {labels.length}개 반</div>
                                            </div>
                                        </div>
                                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                                            <button onClick={()=>setExpanded(isExp?null:t.ID)}
                                                style={{fontSize:11,fontWeight:900,padding:'6px 10px',borderRadius:10,background:isExp?'#f1f5f9':'#f8fafc',color:'#64748b'}}>
                                                {isExp?'접기':'담당반'}

                                            <button onClick={()=>handleResetTeacherPw(t.Name)}

                                                비번 초기화
                                            </button>

                                                <Icon name="trash" size={14}/>
                                            </button>
                                        </div>
                                    </div>
                                    {isExp && (
                                        <div style={{background:'#f8fafc',borderRadius:12,padding:12}}>
                                            {labels.length===0
                                                ? <div style={{fontSize:12,color:'#94a3b8',fontWeight:700}}>담당 반 없음</div>
                                                : <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                                                    {labels.map((l,i)=>(
                                                        <span key={i} style={{fontSize:11,fontWeight:900,padding:'4px 10px',borderRadius:10,background:'#0f172a',color:'#fff'}}>{l}</span>
                                                    ))}
                                                  </div>
                                            }
                                        </div>
                                    )}
                                </div>
                            );
                        })
                    }
                </>
            )}

            {/* 관리자 목록 */}
            {tab === 'admin' && (
                <>
                    {safeAdmins.map((a,i) => (
                        <div key={i} className="list-item" style={{flexDirection:'row',alignItems:'center',justifyContent:'space-between'}}>
                            <div style={{display:'flex',alignItems:'center',gap:10}}>
                                <div style={{width:40,height:40,borderRadius:'50%',background:'#f97316',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:900}}>{(a.name||'?')[0]}</div>
                                <div>
                                    <span style={{fontSize:14,fontWeight:900,color:'#1e293b'}}>{a.name} 관리자</span>
                                    <div style={{fontSize:11,fontWeight:700,color:'#94a3b8'}}>일반 관리자</div>
                                </div>
                            </div>
                            <button onClick={()=>handleResetAdminPw(a.name)}
                                style={{fontSize:11,fontWeight:900,padding:'8px 12px',borderRadius:10,background:'#fff7ed',color:'#f97316',border:'1px solid #fed7aa'}}>
                                비번 초기화
                            </button>
                        </div>
                    ))}
                </>
            )}
        </div>
    );
};

// ━━━ 공통 검색바 컴포넌트 ━━━
const SearchBar = ({ value, onChange, placeholder='검색어를 입력하세요...', count, total }) => (
    <div style={{display:'flex',flexDirection:'column',gap:10,background:'#fff',border:'1px solid #f1f5f9',borderRadius:20,padding:16,boxShadow:'0 1px 4px rgba(0,0,0,.04)',marginBottom:4}}>
        <div style={{position:'relative'}}>
            <svg style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'#cbd5e1'}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input
                style={{width:'100%',padding:'11px 40px',background:'#f8fafc',border:'2px solid transparent',borderRadius:14,fontSize:13,fontWeight:700,outline:'none',color:'#1e293b',transition:'border-color .2s'}}
                onFocus={e=>e.target.style.borderColor='#fb923c'}
                onBlur={e=>e.target.style.borderColor='transparent'}
                placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)}/>
            {value && (
                <button onClick={()=>onChange('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#cbd5e1',display:'flex'}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            )}
        </div>
        <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',borderTop:'1px solid #f8fafc',paddingTop:8}}>
            {value
                ? <><span style={{color:'#f97316',fontWeight:900}}>{count}건</span> / 전체 {total}건
                    {count===0 && <span style={{color:'#ef4444',marginLeft:12}}>검색 결과가 없습니다</span>}</>
                : <>전체 <span style={{color:'#1e293b',fontWeight:900}}>{total}건</span></>
            }
        </div>
    </div>
);

// 검색어 하이라이트
const Highlight = ({ text, keyword }) => {
    if (!keyword||!text) return <>{text}</>;
    const parts = String(text).split(new RegExp(`(${keyword})`, 'gi'));
    return <>{parts.map((p,i) => p.toLowerCase()===keyword.toLowerCase()
        ? <mark key={i} style={{background:'#fef08a',borderRadius:3,padding:'0 2px'}}>{p}</mark>
        : p
    )}</>;
};

// ━━━ 관리자용 전체 뷰 (검색 포함) ━━━
const JournalAllView = ({ journals }) => {
    const [q, setQ] = useState('');
    const sorted = [...journals].sort((a,b)=>new Date(b.Date)-new Date(a.Date));
    const filtered = sorted.filter(j => !q || [j.TeacherName,j.Content,j.Date].some(v=>String(v).includes(q)));
    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            <SearchBar value={q} onChange={setQ} placeholder="강사명, 내용으로 검색..." count={filtered.length} total={sorted.length}/>
            {filtered.length===0 ? <div className="empty-box"><p style={{fontWeight:700}}>검색 결과가 없습니다</p></div> :
                filtered.map(j=>(
                    <div key={j.ID} className="list-item">
                        <div className="list-meta">
                            <span className="badge badge-done">{j.Date}</span>
                            <span style={{fontWeight:900,color:'#1e293b'}}><Highlight text={j.TeacherName} keyword={q}/> 강사</span>
                        </div>
                        <div className="list-content"><Highlight text={j.Content} keyword={q}/></div>
                    </div>
                ))
            }
        </div>
    );
};

const AbsenceAllView = ({ absences }) => {
    const [q, setQ] = useState('');
    const sorted = [...absences].sort((a,b)=>new Date(b.Date)-new Date(a.Date));
    const filtered = sorted.filter(a => !q || [a.StudentName,a.ClassName,a.Reason,a.TeacherName,a.Date].some(v=>String(v).includes(q)));
    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            <SearchBar value={q} onChange={setQ} placeholder="학생 이름, 사유, 강사명으로 검색..." count={filtered.length} total={sorted.length}/>
            {filtered.length===0 ? <div className="empty-box"><p style={{fontWeight:700}}>검색 결과가 없습니다</p></div> :
                filtered.map(a=>(
                    <div key={a.ID} className="list-item">
                        <div className="list-meta">
                            <span className="badge badge-new">{a.Date}</span>
                            <span style={{fontWeight:900,color:'#1e293b'}}><Highlight text={a.StudentName} keyword={q}/></span>
                            {a.ClassName && <span style={{color:'#94a3b8'}}><Highlight text={a.ClassName} keyword={q}/></span>}
                            <span style={{marginLeft:'auto',color:'#94a3b8'}}><Highlight text={a.TeacherName} keyword={q}/></span>
                        </div>
                        <div className="list-content"><Highlight text={a.Reason} keyword={q}/></div>
                    </div>
                ))
            }
        </div>
    );
};

const CounselAllView = ({ counsels }) => {
    const [q, setQ] = useState('');
    const sorted = [...counsels].sort((a,b)=>new Date(b.Date)-new Date(a.Date));
    const filtered = sorted.filter(c => !q || [c.StudentName,c.ParentName,c.Content,c.TeacherName,c.Date].some(v=>String(v).includes(q)));
    return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12,paddingBottom:40}}>
            <SearchBar value={q} onChange={setQ} placeholder="학생 이름, 학부모 이름, 내용으로 검색..." count={filtered.length} total={sorted.length}/>
            {filtered.length===0 ? <div className="empty-box"><p style={{fontWeight:700}}>검색 결과가 없습니다</p></div> :
                filtered.map(c=>(
                    <div key={c.ID} className="list-item">
                        <div className="list-meta">
                            <span className="badge badge-blue">{c.Date}</span>
                            <span style={{fontWeight:900,color:'#1e293b'}}><Highlight text={c.StudentName} keyword={q}/></span>
                            {c.ParentName && <span>학부모: <Highlight text={c.ParentName} keyword={q}/></span>}
                            <span style={{marginLeft:'auto',color:'#94a3b8'}}><Highlight text={c.TeacherName} keyword={q}/></span>
                        </div>
                        <div className="list-content"><Highlight text={c.Content} keyword={q}/></div>
                    </div>
                ))
            }
        </div>
    );
};

// ━━━ 메인 앱 ━━━
const App = () => {
    const [user, setUser] = useState(null);

    const handleLogin     = (u) => setUser(u);
    const handleLogout    = () => setUser(null);
    const handleSetupDone = (u) => setUser(u);

    if (!user) return <LoginScreen onLogin={handleLogin}/>;
    // 강사 첫 로그인 → 셋업 (비번변경 + 담당반 선택)
    if (user.role==='teacher' && user.isFirst) return <SetupScreen user={user} onDone={handleSetupDone}/>;
    // 일반 관리자 첫 로그인 → 비번만 변경 (담당반 없음)
    if (user.role==='admin' && !user.isSuper && user.isFirst) return <AdminSetupScreen user={user} onDone={handleSetupDone}/>;
    if (user.role==='admin') return <AdminApp user={user} onLogout={handleLogout}/>;
    return <TeacherApp user={user} onLogout={handleLogout}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
